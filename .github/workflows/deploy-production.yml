name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  REGISTRY: registry.digitalocean.com/central-promos-registry
  IMAGE_NAME: central-promos-enginee
  CLUSTER_NAME: central-promos-enginee
  K8S_NAMESPACE: central-promos-enginee
  DEPLOYMENT_NAME: central-promos-enginee

jobs:
  deploy:
    name: Build And Deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DigitalOcean Registry
        run: doctl registry login --expiry-seconds 1200

      - name: Build and push image
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -t $REGISTRY/$IMAGE_NAME:$IMAGE_TAG \
            -t $REGISTRY/$IMAGE_NAME:latest \
            --push .

      - name: Save kubeconfig
        run: doctl kubernetes cluster kubeconfig save --expiry-seconds 1200 $CLUSTER_NAME

      - name: Apply base manifests
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml

      - name: Update deployment image
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          kubectl -n $K8S_NAMESPACE set image deployment/$DEPLOYMENT_NAME \
            $DEPLOYMENT_NAME=$REGISTRY/$IMAGE_NAME:$IMAGE_TAG

      - name: Wait for rollout
        run: kubectl -n $K8S_NAMESPACE rollout status deployment/$DEPLOYMENT_NAME --timeout=180s
